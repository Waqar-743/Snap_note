name: Windows Tauri Build

on:
  push:
    branches: [main]
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: snapnote

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: snapnote/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: snapnote/src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci --legacy-peer-deps

      - name: Build Tauri app (Windows bundles)
        run: npm run tauri build

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: snapnote-windows-msi
          path: snapnote/src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error

      - name: Upload EXE artifact (if generated)
        uses: actions/upload-artifact@v4
        with:
          name: snapnote-windows-exe
          path: snapnote/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: ignore

      - name: Publish Release assets (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            snapnote/src-tauri/target/release/bundle/msi/*.msi
            snapnote/src-tauri/target/release/bundle/nsis/*.exe
